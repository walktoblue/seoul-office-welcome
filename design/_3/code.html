<!DOCTYPE html><html lang="ko"><head>
<meta charset="utf-8">

                    "error-container": "#ffdad6",
                    "surface-container-low": "#f0f3ff",

                    "on-primary-fixed-variant": "#003ea8",
                    "surface-container": "#e7eeff",

                    "on-primary-fixed": "#00174b",

                    "on-background": "#111c2d",

                    "on-secondary": "#ffffff",

<style>
        body {
            background-color: #F8FAFC;
            font-family: 'Hanken Grotesk', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .login-card {
            box-shadow: 0px 4px 20px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>
<body class="flex flex-col min-h-screen text-on-surface">
<!-- Navigation Shell Suppression: As per mandate, login screens exclude global navigation -->
<main class="flex-grow flex items-center justify-center px-gutter py-xl">
<div class="w-full max-w-[400px] space-y-lg">
<!-- Branding / Logo Anchor -->
<div class="text-center mb-xl">
<h2 class="font-headline-lg text-headline-lg text-primary tracking-tight">CampusBridge</h2>
<p class="font-label-md text-label-md text-secondary mt-base">University Worker Portal</p>
</div>
<!-- Login Card (Level 1 Surface) -->
<div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-lg login-card">
<div class="mb-lg">
<h1 class="font-headline-md text-headline-md text-on-surface">관리자 로그인</h1>
<p class="font-label-md text-label-md text-on-surface-variant mt-xs">보안을 위해 비밀번호를 입력해주세요.</p>
</div>
<form class="space-y-md" id="loginForm">
<!-- Password Field -->
<div class="space-y-base">
<label class="block font-label-md text-label-md text-on-surface-variant" for="password">비밀번호</label>
<div class="relative">
<input class="w-full h-12 px-md font-body-md text-body-md rounded-lg border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all placeholder:text-outline" id="password" name="password" placeholder="비밀번호를 입력하세요" required="" type="password">
<button class="absolute right-md top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined text-[20px]" id="passwordIcon">visibility</span>
</button>
</div>
</div>
<!-- Primary Action -->
<button class="w-full h-12 bg-primary-container text-on-primary-container font-label-md text-label-md rounded-lg hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-sm" type="submit">
                        로그인
                        <span class="material-symbols-outlined text-[18px]">login</span>
</button>
</form>
<!-- Help Links -->
<div class="mt-lg pt-md border-t border-outline-variant flex justify-between">
<a class="font-label-sm text-label-sm text-secondary hover:text-primary hover:underline transition-all" href="#">비밀번호 찾기</a>
<a class="font-label-sm text-label-sm text-secondary hover:text-primary hover:underline transition-all" href="#">시스템 지원</a>
</div>
</div>
<!-- Language/System Footer -->
<div class="text-center">
<p class="font-label-sm text-label-sm text-outline">© 2024 University Student Employment System</p>
</div>
</div>
</main>
<!-- Footer Component (Shared Component Implementation) -->
<footer class="w-full max-w-container-max mx-auto px-lg py-md flex justify-between items-center border-t border-outline-variant bg-surface">
<div class="font-label-sm text-label-sm text-secondary">© 2024 University Student Employment</div>
<div class="flex gap-lg">
<a class="font-label-sm text-label-sm text-on-surface-variant hover:underline" href="#">Privacy Policy</a>
<a class="font-label-sm text-label-sm text-on-surface-variant hover:underline" href="#">Support</a>
<a class="font-label-sm text-label-sm text-on-surface-variant hover:underline" href="#">Contact</a>
</div>
</footer>
<script>
        // Password Visibility Toggle Interaction
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const passwordIcon = document.getElementById('passwordIcon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                passwordIcon.innerText = 'visibility_off';
            } else {
                passwordInput.type = 'password';
                passwordIcon.innerText = 'visibility';
            }
        }

        // Form Submission Micro-interaction
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalContent = btn.innerHTML;
            
            btn.disabled = true;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span>';
            
            setTimeout(() => {
                btn.innerHTML = originalContent;
                btn.disabled = false;
                // Add your navigation logic here
                console.log('Login attempt recorded');
            }, 1000);
        });
    </script>
</body></html>
